version: "3.9"

services:
  glusterfs-node1:
    build: ./media-domain/
    container_name: glusterfs-node1
    hostname: glusterfs-node1
    volumes:
      - glusterfs-data1:/data
    networks:
      glusterfs-net:
        ipv4_address: 192.168.1.11
    privileged: true
    ports:
      - "8081:80"
    command: >
      /bin/sh -c "
      ./entrypoint.sh glusterfs-node2 glusterfs-node3 &&

      gluster volume create gv0 replica 3 transport tcp glusterfs-node1:/data/brick glusterfs-node2:/data/brick glusterfs-node3:/data/brick force &&
      gluster volume start gv0 &&
      gluster volume info &&

      ./setup.sh &&
      tail -f /dev/null"

  glusterfs-node2:
    build: ./media-domain/
    container_name: glusterfs-node2
    hostname: glusterfs-node2
    volumes:
      - glusterfs-data2:/data
    networks:
      glusterfs-net:
        ipv4_address: 192.168.1.12
    privileged: true
    ports:
      - "8082:80"
    command: >
      /bin/sh -c "
      ./entrypoint.sh glusterfs-node1 &&
      ./setup.sh &&
      tail -f /dev/null"

  glusterfs-node3:
    build: ./media-domain/
    container_name: glusterfs-node3
    hostname: glusterfs-node3
    volumes:
      - glusterfs-data3:/data
    networks:
      glusterfs-net:
        ipv4_address: 192.168.1.13
    privileged: true
    ports:
      - "8083:80"
    command: >
      /bin/sh -c "
      ./entrypoint.sh glusterfs-node1 && 
      ./setup.sh &&
      tail -f /dev/null"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.0.1
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - glusterfs-net

  kafka:
    image: confluentinc/cp-kafka:7.0.1
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9096:9096"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9096
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9096
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - glusterfs-net

  page-adding-service:
    build: ./page_adding_service
    container_name: page_adding_service
    ports:
      - "9400:9400"
    depends_on:
      - kafka
    networks:
      - glusterfs-net


volumes:
  glusterfs-data1:
  glusterfs-data2:
  glusterfs-data3:

networks:
  glusterfs-net:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.1.0/24
